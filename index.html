<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Horta ONG — Painel de Irrigação</title>
  <!-- Biblioteca MQTT.js para conexão via WebSocket com HiveMQ -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/4.3.7/mqtt.min.js"></script>
  <style>
    /* ============ RESET & VARIÁVEIS ============ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --verde:    #2d7a3a;
      --verde-cl: #e8f5e9;
      --azul:     #1565c0;
      --azul-cl:  #e3f2fd;
      --laranja:  #e65100;
      --laranja-cl: #fff3e0;
      --vermelho: #c62828;
      --cinza:    #546e7a;
      --cinza-cl: #f5f5f5;
      --branco:   #ffffff;
      --sombra:   0 2px 8px rgba(0,0,0,0.10);
      --raio:     12px;
    }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #f0f4f8;
      color: #263238;
      min-height: 100vh;
    }

    /* ============ CABEÇALHO ============ */
    header {
      background: var(--verde);
      color: #fff;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: var(--sombra);
    }
    header h1 { font-size: 1.3rem; font-weight: 700; }
    header p  { font-size: 0.85rem; opacity: 0.85; }
    #status-conexao {
      display: flex; align-items: center; gap: 8px;
      font-size: 0.85rem; background: rgba(255,255,255,0.15);
      padding: 6px 12px; border-radius: 20px;
    }
    #dot-conexao {
      width: 10px; height: 10px; border-radius: 50%;
      background: #f44336; transition: background 0.4s;
    }
    #dot-conexao.conectado { background: #69f0ae; }

    /* ============ LAYOUT PRINCIPAL ============ */
    main { max-width: 1000px; margin: 0 auto; padding: 24px 16px; }
    .grid { display: grid; gap: 20px; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); }

    /* ============ CARDS ============ */
    .card {
      background: var(--branco);
      border-radius: var(--raio);
      box-shadow: var(--sombra);
      padding: 20px;
    }
    .card h2 {
      font-size: 1rem; font-weight: 600;
      color: var(--cinza); text-transform: uppercase;
      letter-spacing: 0.05em; margin-bottom: 16px;
      display: flex; align-items: center; gap: 8px;
    }
    .card h2 .icone { font-size: 1.2rem; }

    /* ============ NÍVEL DA CAIXA ============ */
    .nivel-wrap { display: flex; align-items: center; gap: 20px; }
    .caixa-visual {
      width: 60px; height: 100px;
      border: 3px solid var(--cinza);
      border-radius: 4px; position: relative;
      overflow: hidden; flex-shrink: 0;
    }
    .caixa-agua {
      position: absolute; bottom: 0; left: 0; right: 0;
      background: linear-gradient(to top, #1565c0, #42a5f5);
      transition: height 1s ease; height: 0%;
    }
    .nivel-info { flex: 1; }
    .nivel-pct {
      font-size: 2.8rem; font-weight: 700;
      line-height: 1; color: var(--azul);
    }
    .nivel-badge {
      display: inline-block; margin-top: 6px;
      padding: 4px 12px; border-radius: 20px;
      font-size: 0.85rem; font-weight: 600;
    }
    .nivel-badge.baixo   { background: #ffcdd2; color: #b71c1c; }
    .nivel-badge.medio   { background: #fff9c4; color: #f57f17; }
    .nivel-badge.cheio   { background: #c8e6c9; color: #1b5e20; }
    .nivel-dist { margin-top: 4px; font-size: 0.8rem; color: var(--cinza); }

    /* ============ CONTROLE DE IRRIGAÇÃO ============ */
    .irrigacao-estado {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 16px;
    }
    .led-bomba {
      width: 18px; height: 18px; border-radius: 50%;
      background: #ef9a9a; border: 2px solid #e53935;
      transition: all 0.3s; box-shadow: none;
    }
    .led-bomba.ligado {
      background: #69f0ae;
      border-color: #00c853;
      box-shadow: 0 0 10px rgba(0, 200, 83, 0.5);
    }
    .estado-texto { font-size: 1.1rem; font-weight: 600; }
    .timer-texto  { font-size: 0.85rem; color: var(--cinza); margin-left: auto; }

    .btn-row { display: flex; gap: 10px; margin-bottom: 14px; }
    .btn {
      flex: 1; padding: 12px; border: none; border-radius: 8px;
      font-size: 0.95rem; font-weight: 600; cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }
    .btn:active { transform: scale(0.97); }
    .btn-ligar    { background: var(--verde);   color: #fff; }
    .btn-desligar { background: var(--vermelho); color: #fff; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .duracao-wrap {
      display: flex; align-items: center; gap: 10px;
      background: var(--cinza-cl); padding: 10px 12px;
      border-radius: 8px; font-size: 0.9rem;
    }
    .duracao-wrap label { white-space: nowrap; }
    .duracao-wrap select {
      border: 1px solid #ccc; border-radius: 6px;
      padding: 4px 8px; font-size: 0.9rem; flex: 1;
    }

    /* ============ AGENDAMENTOS ============ */
    .agenda-lista { display: flex; flex-direction: column; gap: 10px; }
    .agenda-item {
      display: flex; align-items: center; gap: 10px;
      background: var(--cinza-cl); padding: 10px 12px;
      border-radius: 8px; font-size: 0.9rem;
    }
    .agenda-item input[type="time"] {
      border: 1px solid #ccc; border-radius: 6px;
      padding: 4px 8px; font-size: 0.9rem;
    }
    .agenda-item select {
      border: 1px solid #ccc; border-radius: 6px;
      padding: 4px 8px; font-size: 0.9rem;
    }
    .agenda-item .label-hora { font-weight: 600; min-width: 30px; }
    .toggle-ativo {
      margin-left: auto; width: 36px; height: 20px;
      appearance: none; -webkit-appearance: none;
      background: #ccc; border-radius: 10px; cursor: pointer;
      position: relative; transition: background 0.3s;
    }
    .toggle-ativo:checked { background: var(--verde); }
    .toggle-ativo::after {
      content: ""; position: absolute; width: 16px; height: 16px;
      background: #fff; border-radius: 50%; top: 2px; left: 2px;
      transition: left 0.3s;
    }
    .toggle-ativo:checked::after { left: 18px; }

    .btn-salvar-agenda {
      width: 100%; margin-top: 14px;
      padding: 10px; border: none; border-radius: 8px;
      background: var(--azul); color: #fff;
      font-size: 0.95rem; font-weight: 600; cursor: pointer;
    }
    .btn-salvar-agenda:hover { opacity: 0.9; }

    /* ============ LOG ============ */
    .log-box {
      background: #1a1a2e; color: #a0e0a0;
      border-radius: 8px; padding: 12px;
      height: 160px; overflow-y: auto;
      font-family: monospace; font-size: 0.8rem;
      line-height: 1.6;
    }
    .log-box p { margin: 0; }
    .log-box .log-erro  { color: #ff5252; }
    .log-box .log-info  { color: #64b5f6; }
    .log-box .log-ok    { color: #69f0ae; }

    /* ============ RESPONSIVO ============ */
    @media (max-width: 480px) {
      header { flex-direction: column; gap: 8px; align-items: flex-start; }
      .btn { padding: 10px; font-size: 0.85rem; }
    }
  </style>
</head>
<body>

<header>
  <div>
    <h1>🌱 Horta ONG — Irrigação Inteligente</h1>
    <p>Monitoramento e controle via ESP32 + HiveMQ MQTT</p>
  </div>
  <div id="status-conexao">
    <div id="dot-conexao"></div>
    <span id="texto-conexao">Desconectado</span>
  </div>
</header>

<main>
  <div class="grid">

    <!-- CARD: Nível da Caixa d'Água -->
    <div class="card">
      <h2><span class="icone">💧</span> Caixa d'Água</h2>
      <div class="nivel-wrap">
        <div class="caixa-visual">
          <div class="caixa-agua" id="caixa-agua"></div>
        </div>
        <div class="nivel-info">
          <div class="nivel-pct" id="nivel-pct">—</div>
          <div class="nivel-badge" id="nivel-badge">aguardando</div>
          <div class="nivel-dist" id="nivel-dist"></div>
        </div>
      </div>
    </div>

    <!-- CARD: Controle de Irrigação -->
    <div class="card">
      <h2><span class="icone">🚿</span> Irrigação</h2>
      <div class="irrigacao-estado">
        <div class="led-bomba" id="led-bomba"></div>
        <span class="estado-texto" id="estado-texto">Desligada</span>
        <span class="timer-texto" id="timer-texto"></span>
      </div>
      <div class="btn-row">
        <button class="btn btn-ligar"    id="btn-ligar"    onclick="enviarComando('ligar')">▶ Ligar</button>
        <button class="btn btn-desligar" id="btn-desligar" onclick="enviarComando('desligar')">■ Desligar</button>
      </div>
      <div class="duracao-wrap">
        <label for="sel-duracao">⏱ Duração:</label>
        <select id="sel-duracao">
          <option value="0">Manual (sem timer)</option>
          <option value="5">5 minutos</option>
          <option value="10">10 minutos</option>
          <option value="15" selected>15 minutos</option>
          <option value="20">20 minutos</option>
          <option value="30">30 minutos</option>
          <option value="45">45 minutos</option>
          <option value="60">1 hora</option>
        </select>
      </div>
    </div>

    <!-- CARD: Agendamentos -->
    <div class="card" style="grid-column: 1 / -1;">
      <h2><span class="icone">📅</span> Horários de Irrigação</h2>
      <div class="agenda-lista" id="agenda-lista">
        <!-- Gerado por JavaScript -->
      </div>
      <button class="btn-salvar-agenda" onclick="salvarAgendamentos()">💾 Salvar horários no ESP32</button>
    </div>

    <!-- CARD: Log -->
    <div class="card" style="grid-column: 1 / -1;">
      <h2><span class="icone">📋</span> Log de eventos</h2>
      <div class="log-box" id="log-box"></div>
    </div>

  </div>
</main>

<script>
// ============================================================
//  CONFIGURAÇÕES — ALTERE AQUI PARA CORRESPONDER AO SEU CLUSTER
// ============================================================
const MQTT_HOST     = "77d9f94ffad94e568e3cdc3c92f4e1ec.s1.eu.hivemq.cloud"; // <-- mesmo do ESP32
const MQTT_PORT     = 8883;   // WebSocket TLS
const MQTT_USER     = "computaria";
const MQTT_PASSWORD = "Computaria1";
const CLIENT_ID     = "ESP32_Projeto" + Math.random().toString(16).substr(2, 6);

const TOPIC_NIVEL       = "horta/nivel";
const TOPIC_STATUS      = "horta/irrigacao/status";
const TOPIC_CMD         = "horta/irrigacao/cmd";
const TOPIC_AGENDAMENTO = "horta/agendamento";

// ============================================================
//  ESTADO LOCAL
// ============================================================
let client = null;
let timerInterval = null;
let timerRestante = 0;

// Agendamentos padrão (4 horários)
const agendamentos = [
  { hora: 6,  minuto: 0,  duracao_min: 20, ativo: true  },
  { hora: 11, minuto: 0,  duracao_min: 15, ativo: true  },
  { hora: 16, minuto: 0,  duracao_min: 20, ativo: true  },
  { hora: 19, minuto: 0,  duracao_min: 15, ativo: false },
];

// ============================================================
//  LOG
// ============================================================
function log(msg, tipo = "") {
  const box = document.getElementById("log-box");
  const d = new Date();
  const ts = d.toTimeString().slice(0,8);
  const p = document.createElement("p");
  p.className = tipo ? "log-" + tipo : "";
  p.textContent = `[${ts}] ${msg}`;
  box.appendChild(p);
  box.scrollTop = box.scrollHeight;
  if (box.children.length > 80) box.removeChild(box.firstChild);
}

// ============================================================
//  CONEXÃO MQTT
// ============================================================
function conectar() {
  log("Conectando ao broker MQTT...", "info");

  client = mqtt.connect(`wss://${MQTT_HOST}:${MQTT_PORT}/mqtt`, {
    clientId:  CLIENT_ID,
    username:  MQTT_USER,
    password:  MQTT_PASSWORD,
    clean:     true,
    reconnectPeriod: 4000,
  });

  client.on("connect", () => {
    document.getElementById("dot-conexao").classList.add("conectado");
    document.getElementById("texto-conexao").textContent = "Conectado";
    log("Conectado ao HiveMQ!", "ok");

    client.subscribe(TOPIC_NIVEL);
    client.subscribe(TOPIC_STATUS);
    log(`Assinando: ${TOPIC_NIVEL}, ${TOPIC_STATUS}`, "info");
  });

  client.on("disconnect", () => {
    document.getElementById("dot-conexao").classList.remove("conectado");
    document.getElementById("texto-conexao").textContent = "Desconectado";
    log("Desconectado do broker", "erro");
  });

  client.on("error", (err) => {
    log("Erro MQTT: " + err.message, "erro");
  });

  client.on("message", (topic, payload) => {
    const msg = payload.toString();
    log(`← ${topic}: ${msg}`);
    try {
      const data = JSON.parse(msg);
      if (topic === TOPIC_NIVEL)  atualizarNivel(data);
      if (topic === TOPIC_STATUS) atualizarStatus(data);
    } catch (e) {
      log("Erro ao processar mensagem: " + e.message, "erro");
    }
  });
}

// ============================================================
//  ATUALIZAR INTERFACE — NÍVEL DA CAIXA
// ============================================================
function atualizarNivel(data) {
  const pct  = data.porcentagem ?? 0;
  const st   = data.status      ?? "baixo";
  const dist = data.distancia_cm ?? "?";

  document.getElementById("nivel-pct").textContent = pct + "%";
  document.getElementById("caixa-agua").style.height = pct + "%";

  const badge = document.getElementById("nivel-badge");
  badge.textContent = { baixo: "⚠ Baixo", medio: "Médio", cheio: "✔ Cheio" }[st] ?? st;
  badge.className = "nivel-badge " + st;

  document.getElementById("nivel-dist").textContent = `Distância sensor: ${dist} cm`;
}

// ============================================================
//  ATUALIZAR INTERFACE — STATUS IRRIGAÇÃO
// ============================================================
function atualizarStatus(data) {
  const ligado = data.ligado === true;
  const timer  = data.timer  ?? 0;

  const led    = document.getElementById("led-bomba");
  const texto  = document.getElementById("estado-texto");
  const timerEl = document.getElementById("timer-texto");

  led.classList.toggle("ligado", ligado);
  texto.textContent = ligado ? "Ligada ✔" : "Desligada";
  texto.style.color = ligado ? "#2e7d32" : "#c62828";

  if (timerInterval) clearInterval(timerInterval);
  timerRestante = timer;

  if (ligado && timer > 0) {
    atualizarTimerDisplay();
    timerInterval = setInterval(() => {
      timerRestante--;
      if (timerRestante <= 0) { clearInterval(timerInterval); timerEl.textContent = ""; }
      else atualizarTimerDisplay();
    }, 1000);
  } else {
    timerEl.textContent = "";
  }
}

function atualizarTimerDisplay() {
  const m = Math.floor(timerRestante / 60);
  const s = timerRestante % 60;
  document.getElementById("timer-texto").textContent =
    `Desliga em ${m}:${String(s).padStart(2, "0")}`;
}

// ============================================================
//  ENVIAR COMANDO DE IRRIGAÇÃO
// ============================================================
function enviarComando(acao) {
  if (!client || !client.connected) { log("Não conectado ao broker!", "erro"); return; }

  const duracao = parseInt(document.getElementById("sel-duracao").value);
  const payload = JSON.stringify({ acao, duracao_min: duracao });

  client.publish(TOPIC_CMD, payload, { qos: 1 }, (err) => {
    if (err) log("Erro ao publicar: " + err.message, "erro");
    else     log(`→ Comando enviado: ${acao} (${duracao} min)`, "ok");
  });
}

// ============================================================
//  RENDERIZAR AGENDAMENTOS
// ============================================================
function renderizarAgendamentos() {
  const lista = document.getElementById("agenda-lista");
  lista.innerHTML = "";

  agendamentos.forEach((ag, i) => {
    const hora = String(ag.hora).padStart(2, "0");
    const min  = String(ag.minuto).padStart(2, "0");

    const item = document.createElement("div");
    item.className = "agenda-item";
    item.innerHTML = `
      <span class="label-hora">${i + 1}.</span>
      <label>Hora:</label>
      <input type="time" value="${hora}:${min}"
             onchange="atualizarHora(${i}, this.value)" />
      <label>Duração:</label>
      <select onchange="atualizarDuracao(${i}, this.value)">
        ${[5,10,15,20,30,45,60].map(d =>
          `<option value="${d}" ${d === ag.duracao_min ? "selected" : ""}>${d} min</option>`
        ).join("")}
      </select>
      <input type="checkbox" class="toggle-ativo" title="Ativo"
             ${ag.ativo ? "checked" : ""}
             onchange="agendamentos[${i}].ativo = this.checked" />
    `;
    lista.appendChild(item);
  });
}

function atualizarHora(i, valor) {
  const [h, m] = valor.split(":").map(Number);
  agendamentos[i].hora   = h;
  agendamentos[i].minuto = m;
}
function atualizarDuracao(i, valor) {
  agendamentos[i].duracao_min = parseInt(valor);
}

// ============================================================
//  SALVAR AGENDAMENTOS (publica no broker → ESP32 recebe)
// ============================================================
function salvarAgendamentos() {
  if (!client || !client.connected) { log("Não conectado ao broker!", "erro"); return; }

  const payload = JSON.stringify(agendamentos);
  client.publish(TOPIC_AGENDAMENTO, payload, { qos: 1 }, (err) => {
    if (err) log("Erro ao salvar agenda: " + err.message, "erro");
    else     log("→ Agendamentos salvos no ESP32!", "ok");
  });
}

// ============================================================
//  INICIALIZAÇÃO
// ============================================================
renderizarAgendamentos();
conectar();
</script>
</body>
</html>a
